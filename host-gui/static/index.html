<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Smart Exhibit Case Guardian</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <h1>Case Guardian</h1>
          <p id="lastUpdate" class="subtle">No data</p>
        </div>
        <div class="connection">
          <select id="portSelect" aria-label="Serial port"></select>
          <input id="baudInput" type="number" value="115200" min="9600" step="9600" aria-label="Baud rate">
          <button id="connectBtn" type="button">Connect</button>
          <button id="disconnectBtn" type="button">Disconnect</button>
          <span id="statusPill" class="status-pill offline">Offline</span>
        </div>
      </header>

      <section class="control-grid">
        <div class="main-column">
          <section id="caseStatusCard" class="status-band status-attention">
            <div>
              <span class="label">Status</span>
              <strong id="caseStatusValue">Attention</strong>
              <p id="caseStatusReason">No data</p>
              <div id="activeAlarmList" class="active-alarm-list" hidden></div>
            </div>
            <div class="status-facts">
              <div>
                <span>Mode</span>
                <strong id="protectionModeValue">--</strong>
              </div>
              <div>
                <span>Interrupt</span>
                <strong id="lastInterruptValue">--</strong>
              </div>
            </div>
          </section>

          <section class="panel readings-panel">
            <div class="section-head">
              <h2>Live</h2>
              <span id="environmentStatus" class="inline-state">--</span>
            </div>
            <div class="metric-grid">
              <div class="metric primary-metric">
                <span>Temp</span>
                <strong id="tempValue">--</strong>
              </div>
              <div class="metric primary-metric">
                <span>Humidity</span>
                <strong id="humidityValue">--</strong>
              </div>
              <div class="metric">
                <span>Light</span>
                <strong id="lightValue">--</strong>
              </div>
              <div class="metric">
                <span>Force</span>
                <strong id="forceValue">--</strong>
              </div>
              <div class="metric">
                <span>Pressure</span>
                <strong id="pressureValue">--</strong>
              </div>
              <div class="metric">
                <span>Gas</span>
                <strong id="gasValue">--</strong>
              </div>
            </div>
          </section>

          <section class="panel trends-panel">
            <div class="section-head">
              <h2>Trends</h2>
              <span>3 min</span>
            </div>
            <div class="trend-grid">
              <div class="trend-card">
                <div class="trend-head"><span>Temp</span><strong id="trendTempNow">--</strong></div>
                <canvas id="trendTemp"></canvas>
              </div>
              <div class="trend-card">
                <div class="trend-head"><span>Humidity</span><strong id="trendHumidityNow">--</strong></div>
                <canvas id="trendHumidity"></canvas>
              </div>
              <div class="trend-card">
                <div class="trend-head"><span>Light</span><strong id="trendLightNow">--</strong></div>
                <canvas id="trendLight"></canvas>
              </div>
              <div class="trend-card">
                <div class="trend-head"><span>Force</span><strong id="trendForceNow">--</strong></div>
                <canvas id="trendForce"></canvas>
              </div>
            </div>
          </section>
        </div>

        <aside class="side-column">
          <section class="panel alarm-panel">
            <div class="section-head">
              <h2>Alarm Log</h2>
            </div>
            <div id="alarmLog" class="event-log">
              <p class="empty-log">No alarms</p>
            </div>
          </section>

          <section class="panel config-panel">
            <div class="section-head">
              <h2>Runtime</h2>
              <button id="readConfigBtn" type="button">Read Config</button>
            </div>

            <form id="configForm" class="config-form">
              <div class="config-row">
                <label for="protectionModeSelect">Mode</label>
                <select id="protectionModeSelect">
                  <option value="armed">Armed</option>
                  <option value="service">Service</option>
                </select>
              </div>
              <div class="config-row">
                <label for="rateSelect">Sampling rate</label>
                <select id="rateSelect">
                  <option value="fast">Fast (500 ms)</option>
                  <option value="normal">Normal (2000 ms)</option>
                  <option value="slow">Slow (5000 ms)</option>
                </select>
              </div>

              <details class="advanced-config">
                <summary>Limits</summary>
                <div class="advanced-grid">
                  <div class="config-field">
                    <label for="thresholdInput">FSR raw</label>
                    <input id="thresholdInput" type="text" inputmode="numeric" pattern="[0-9]*" value="1000">
                  </div>
                  <div class="config-field">
                    <label for="samplingInput">Sampling ms</label>
                    <input id="samplingInput" type="text" inputmode="numeric" pattern="[0-9]*" value="2000">
                  </div>
                  <div class="config-field">
                    <label for="lightHighInput">Light raw</label>
                    <input id="lightHighInput" type="text" inputmode="numeric" pattern="[0-9]*" value="2000">
                  </div>
                  <div class="config-field">
                    <label for="tempHighInput">Temp C</label>
                    <input id="tempHighInput" type="text" inputmode="decimal" value="30.00">
                  </div>
                  <div class="config-field">
                    <label for="humidityHighInput">Humidity %</label>
                    <input id="humidityHighInput" type="text" inputmode="decimal" value="70.00">
                  </div>
                </div>
              </details>

              <div class="form-actions">
                <span id="configStatus" class="config-status">ready</span>
              </div>
            </form>
          </section>

          <details id="debugPanel" class="debug-panel">
            <summary>
              <span>Serial</span>
              <small id="debugSummary">0 lines</small>
            </summary>
            <section class="serial-panel">
              <div class="section-head">
                <h2>Raw Log</h2>
                <button id="clearLogBtn" type="button">Clear</button>
              </div>
              <pre id="rawLog" aria-live="polite"></pre>
            </section>
          </details>
        </aside>
      </section>
    </main>
    <script src="/static/app.js"></script>
  </body>
</html>
